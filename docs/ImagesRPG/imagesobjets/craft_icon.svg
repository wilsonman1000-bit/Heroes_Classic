<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="anvil-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#757575"/>
      <stop offset="1" stop-color="#424242"/>
    </linearGradient>
    <linearGradient id="hammer-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8d6e63"/>
      <stop offset="1" stop-color="#5d4037"/>
    </linearGradient>
  </defs>

  <!-- Anvil base -->
  <rect x="18" y="42" width="28" height="8" rx="2" fill="#37474f"/>
  
  <!-- Anvil body -->
  <path d="M22 28h20l4 14H18z" fill="url(#anvil-grad)" stroke="#263238" stroke-width="1.5"/>
  <rect x="26" y="24" width="12" height="4" rx="1" fill="#616161"/>
  
  <!-- Anvil horn -->
  <path d="M42 32l6-4v8z" fill="#616161"/>
  
  <!-- Hammer handle -->
  <rect x="38" y="8" width="4" height="22" rx="2" fill="url(#hammer-grad)"/>
  
  <!-- Hammer head -->
  <rect x="32" y="12" width="16" height="8" rx="1.5" fill="#616161" stroke="#424242" stroke-width="1"/>
  
  <!-- Sparks -->
  <circle cx="48" cy="18" r="2" fill="#ffb74d" opacity="0.9"/>
  <circle cx="52" cy="22" r="1.5" fill="#ffa726" opacity="0.85"/>
  <circle cx="46" cy="24" r="1.2" fill="#ff9800" opacity="0.8"/>
</svg>
